<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace - Modern Chatbot</title>
    <!-- Simple, Clean English Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <!-- Subtle Gradient Background (Easier to read) -->
    <div class="background-glow"></div>

    <div class="app-container">
        <!-- Sidebar: Chat History -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <i class="fas fa-robot"></i>
                    <span>AI Assistant</span>
                </div>
                <button class="icon-btn close-btn" id="closeSidebarBtn" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <button class="action-btn new-chat-btn" onclick="startNewChat()">
                <i class="fas fa-plus"></i> New Conversation
            </button>

            <div class="history-list" id="historyList">
                <!-- Chat history will appear here -->
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="main-header">
                <div class="header-left">
                    <button class="icon-btn menu-btn" id="menuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="assistant-status">
                        <div class="avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="info">
                            <h1>Chat Assistant</h1>
                            <span class="online-tag"><span class="dot"></span> Online</span>
                        </div>
                    </div>
                </div>

                <div class="header-right">
                    <button class="icon-btn toggle-btn" id="themeToggleBtn" title="Change Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="icon-btn delete-btn" onclick="deleteCurrentChat()" title="Delete Chat">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Conversation Box -->
            <div class="chat-container" id="chatBox">
                <!-- Welcome Message -->
                <div class="welcome-box" id="welcomeScreen">
                    <div class="icon-circle">
                        <i class="fas fa-comment-alt"></i>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>Type a message below to start chatting with the AI.</p>
                </div>
            </div>

            <!-- Input Controls -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Type your message here..." rows="1"></textarea>
                    <button class="send-button" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="helper-text">AI can make mistakes. Please check important info.</div>
            </div>
        </main>
    </div>

    <!-- Scripting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
